<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(100deg, #a10000, #000000,#a10000);
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .input-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: 0.3s;
    }

    input:focus {
      border-color: #4facfe;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #4facfe;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #3a8be0;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .footer a {
      color: #4facfe;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

  </style>
</head>

<body>

  <div class="container">
    <h2>Login Loja</h2>

    <form>
      <div class="input-group">
        <label>Nome completo</label>
        <input type="text" placeholder="Digite seu Nome" required>
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Digite seu Email" required>
      </div>

      <div class="input-group">
        <label>Cnpj</label>
        <input type="number" placeholder="Digite sua Senha" required>
      </div>

      <div class="input-group">
        <label>Digite Sua Senha</label>
        <input type="password" placeholder="Confirme sua Senha" required>
      </div>

      <button class="btn">Criar Conta</button>
    </form>

    <div class="footer">
      Já tem conta? <a href="login.html">Entrar</a>
    </div>
    <div class="footer">
      É dono de Loja? <a href="cadastrovendedor.html">Clique aqui</a>
    </div>
  </div>

</body>
</html>
